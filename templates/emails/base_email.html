<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .email-container { max-width: 600px; margin: 0 auto; background: #fff; border-radius: 8px; overflow: hidden; }
        .email-header { background: #1a1a2e; color: #fff; padding: 20px 30px; }
        .email-header h1 { margin: 0; font-size: 20px; }
        .email-body { padding: 30px; }
        .email-footer { background: #f5f5f5; padding: 15px 30px; font-size: 12px; color: #666; }
        .info-box { background: #f8f9fa; border: 1px solid #eee; border-radius: 6px; padding: 15px; margin: 15px 0; }
        .info-row { display: flex; justify-content: space-between; padding: 4px 0; }
        .info-label { color: #666; }
        .info-value { font-weight: 600; }
    </style>
</head>
<body>
    <div class="email-container">
        <div class="email-header">
            <h1>{{ hotel_name|default:"Hotel PMS" }}</h1>
        </div>
        <div class="email-body">
            {% block content %}{% endblock %}
        </div>
        <div class="email-footer">
            {% if hotel_address %}{{ hotel_address }}<br>{% endif %}
            {% if hotel_phone %}Phone: {{ hotel_phone }}{% endif %}
            <br><br>
            This is an automated email. Please do not reply.
        </div>
    </div>
</body>
</html>
