{% extends "base.html" %}

{% block title %}Room Status Board{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Room Status Board</h4>
    <a href="{% url 'room_list' %}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-list me-1"></i> List View
    </a>
</div>

<div class="row g-3">
    {% for room in rooms %}
    <div class="col-6 col-md-4 col-lg-3" id="room-{{ room.pk }}">
        {% include "dashboard/rooms/_room_card.html" %}
    </div>
    {% endfor %}
</div>
{% endblock %}
