<nav class="navbar navbar-light bg-white border-bottom px-4">
    <div class="d-flex align-items-center flex-grow-1">
        <div class="input-group" style="max-width: 400px;">
            <span class="input-group-text bg-white border-end-0">
                <i class="bi bi-search text-muted"></i>
            </span>
            <input type="text"
                   class="form-control border-start-0"
                   placeholder="Search guests, bookings, rooms..."
                   name="q"
                   hx-get="{% url 'global_search' %}"
                   hx-trigger="keyup changed delay:300ms"
                   hx-target="#search-results"
                   hx-params="q"
                   autocomplete="off">
        </div>
        <div id="search-results" class="position-relative"></div>
    </div>

    <div class="d-flex align-items-center gap-3">
        <span class="text-muted small">
            <i class="bi bi-person-circle me-1"></i>
            {{ request.user.get_full_name|default:request.user.username }}
            {% if request.user.staffprofile %}
            <span class="badge bg-secondary ms-1">{{ request.user.staffprofile.get_role_display }}</span>
            {% endif %}
        </span>
        <a href="{% url 'logout' %}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-box-arrow-right"></i> Logout
        </a>
    </div>
</nav>
